id: model_mobilenet_v2_int8
description: MobileNet V2 1.0 224 int8 model
platforms:
  - apollo510_evb
model:
  source: prebuilt
  path: models/mobilenet_v2_1.0_224_INT8.tflite
test:
  tolerance: 10
  golden_data: golden/mobilenet_golden.npz
memory:
  tensors:
    - kind: constant
      memory: psram
    - kind: persistent
      memory: psram
