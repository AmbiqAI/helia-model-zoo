id: model_wav2letter
description: Wave2Letter pruned int8 model
platforms:
  - apollo510_evb
model:
  source: prebuilt
  path: models/wav2letter_pruned_int8.tflite
test:
  tolerance: 10
  golden_data: golden/wave2letter_golden.npz
  fvp_timeout_seconds: 600
memory:
  tensors:
    - kind: constant
      memory: psram
    - kind: persistent
      memory: psram
