id: model_mobilenet_v2_int8
description: MobileNet V2 1.0 224 int8 model
platforms:
  - apollo510_evb
model:
  source: prebuilt
  path: vision/mobilenet_v2/model.tflite
test:
  tolerance: 10
  golden_data: vision/mobilenet_v2/golden.npz
memory:
  tensors:
    - kind: constant
      memory: psram
    - kind: persistent
      memory: psram
